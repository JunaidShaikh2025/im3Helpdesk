<div class="auth-container">
  <div class="auth-card">
    <h1>iM3 Helpdesk</h1>
    <h2>Reset your password</h2>

    <div class="success-box" *ngIf="submitted">
      <p>Reset link sent to your email!</p>
      <p>Please check your inbox.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!submitted">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" type="email" placeholder="you@company.com"/>
        <mat-error *ngIf="form.get('email')?.hasError('required')">
          Email is required
        </mat-error>
        <mat-error *ngIf="form.get('email')?.hasError('email')">
          Invalid email address
        </mat-error>
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit"
        class="full-width submit-btn" [disabled]="loading">
        <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
        <span *ngIf="!loading">Send Reset Link</span>
      </button>
    </form>

    <div class="auth-links">
      <a routerLink="/login">Back to Login</a>
    </div>
  </div>
</div>
