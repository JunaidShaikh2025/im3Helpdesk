<mat-toolbar color="primary">
  <button mat-button (click)="router.navigate(['/dashboard'])">← Dashboard</button>
  <span>Knowledge Base</span>
  <span class="spacer"></span>
  <button mat-raised-button *ngIf="canManage()"
    (click)="router.navigate(['/kb/create'])">
    + New Article
  </button>
  <button mat-button (click)="logout()">Logout</button>
</mat-toolbar>

<div class="page-container">

  <div class="filter-row">
    <form [formGroup]="filterForm" class="filter-form">
      <mat-form-field appearance="outline" class="search-field">
        <mat-label>Search articles...</mat-label>
        <input matInput formControlName="search"/>
      </mat-form-field>

      <mat-form-field appearance="outline" class="cat-field">
        <mat-label>Category</mat-label>
        <mat-select formControlName="category">
          <mat-option value="">All Categories</mat-option>
          <mat-option *ngFor="let c of categories" [value]="c">
            {{ c }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </form>
  </div>

  <div *ngIf="loading" class="loading-center">
    <mat-spinner diameter="48"></mat-spinner>
  </div>

  <div *ngIf="!loading">
    <div *ngIf="articles.length === 0" class="empty-state">
      <p>No articles found.</p>
      <button mat-raised-button color="primary"
        *ngIf="canManage()"
        (click)="router.navigate(['/kb/create'])">
        Create First Article
      </button>
    </div>

    <div class="articles-grid">
      <mat-card class="article-card"
        *ngFor="let a of articles"
        (click)="router.navigate(['/kb', a.id])">
        <mat-card-content>

          <div class="article-header">
            <span class="category-tag">{{ a.category }}</span>
            <span class="draft-tag" *ngIf="!a.isPublished">Draft</span>
          </div>

          <h3 class="article-title">{{ a.title }}</h3>
          <p class="article-preview">{{ a.contentPreview }}</p>

          <div class="article-footer">
            <div class="article-tags">
              <span class="tag" *ngFor="let tag of a.tags?.split(',')?.slice(0,3)">
                {{ tag.trim() }}
              </span>
            </div>
            <div class="article-meta">
              <span>{{ a.viewCount }} views</span>
              <span>{{ a.createdAt | date:'dd MMM yyyy' }}</span>
            </div>
          </div>

          <div class="article-actions" *ngIf="canManage()"
            (click)="$event.stopPropagation()">
            <button mat-button color="primary"
              (click)="router.navigate(['/kb/edit', a.id])">
              Edit
            </button>
            <button mat-button color="warn"
              (click)="deleteArticle(a.id)">
              Delete
            </button>
          </div>

        </mat-card-content>
      </mat-card>
    </div>
  </div>
</div>
