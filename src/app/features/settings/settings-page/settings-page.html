<app-layout>
  <div class="page-content">
<div class="page-container">
  <div class="settings-container">

    <!-- Theme Selection -->
    <mat-card class="settings-card">
      <mat-card-content>
        <h3>Themes</h3>
        <mat-divider></mat-divider>
        <div class="themes-grid">
          <div class="theme-option"
            *ngFor="let theme of themes"
            [class.active]="currentTheme === theme.id"
            (click)="applyTheme(theme.id)">
            <div class="theme-preview"
              [style.background]="theme.color">
              <span class="theme-check" *ngIf="currentTheme === theme.id">
                ✓
              </span>
            </div>
            <span class="theme-name">{{ theme.name }}</span>
          </div>
        </div>
      </mat-card-content>
    </mat-card>

    <!-- Notifications -->
    <mat-card class="settings-card">
      <mat-card-content>
        <h3>Notifications</h3>
        <mat-divider></mat-divider>

        <div class="setting-row">
          <div class="setting-info">
            <span class="setting-title">Email Notifications</span>
            <span class="setting-desc">
              Receive email alerts for updates
            </span>
          </div>
          <mat-slide-toggle [(ngModel)]="emailNotifications"
            color="primary">
          </mat-slide-toggle>
        </div>

        <mat-divider></mat-divider>

        <div class="setting-row">
          <div class="setting-info">
            <span class="setting-title">Browser Notifications</span>
            <span class="setting-desc">Show push notifications</span>
          </div>
          <mat-slide-toggle [(ngModel)]="browserNotifications"
            color="primary">
          </mat-slide-toggle>
        </div>

        <div class="save-row">
          <button mat-raised-button color="primary"
            (click)="saveNotificationSettings()">
            Save
          </button>
        </div>
      </mat-card-content>
    </mat-card>

    <!-- Language -->
    <mat-card class="settings-card">
      <mat-card-content>
        <h3>Language</h3>
        <mat-divider></mat-divider>

        <div class="setting-row">
          <div class="setting-info">
            <span class="setting-title">Display Language</span>
          </div>
          <mat-form-field appearance="outline" class="lang-select">
            <mat-select [(ngModel)]="language">
              <mat-option *ngFor="let l of languages" [value]="l.code">
                {{ l.name }}
              </mat-option>
            </mat-select>
          </mat-form-field>
        </div>

        <div class="save-row">
          <button mat-raised-button color="primary"
            (click)="saveLanguage()">
            Save Language
          </button>
        </div>
      </mat-card-content>
    </mat-card>

    <!-- Danger Zone -->
    <mat-card class="settings-card danger-card">
      <mat-card-content>
        <h3>Danger Zone</h3>
        <mat-divider></mat-divider>
        <div class="setting-row">
          <div class="setting-info">
            <span class="setting-title">Clear Local Data</span>
            <span class="setting-desc">
              Clear cached data and logout
            </span>
          </div>
          <button mat-raised-button color="warn"
            (click)="clearAllData()">
            Clear & Logout
          </button>
        </div>
      </mat-card-content>
    </mat-card>

  </div>
</div>
 </div>
</app-layout>
